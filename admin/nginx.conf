server {
    listen 80;
    listen [::]:80;
    server_name admin.elcar.az;
    return 302 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate         /etc/ssl/certs/cert.pem;
    ssl_certificate_key     /etc/ssl/private/cert.key;

    server_name admin.elcar.az;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_disable “MSIE [1-6]\.(?!.*SV1)”;
    gzip_types text/css text/javascript text/xml text/plain text/x-component application/javascript application/x-javascript application/json application/xml application/rss+xml application/atom+xml application/x-font-ttf font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    location / {
        include                                 proxy_params;
        proxy_pass                              http://localhost:3112;

        proxy_redirect                          off;
        proxy_set_header Host                   $host;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      https;
        proxy_set_header Cookie                 $http_cookie;
        proxy_headers_hash_max_size             2048;
        proxy_pass_header                       *;
        proxy_read_timeout                      1m;
        proxy_connect_timeout                   1m;
    }
}
